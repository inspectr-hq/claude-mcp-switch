name: Release macOS App

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        id: release_meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build Claude MCP Switch
        run: |
          echo "Building marketing version: $VERSION"
          xcodebuild \
            -project ClaudeMcpSwitch.xcodeproj \
            -scheme ClaudeMcpSwitch \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION="$VERSION" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/ClaudeMcpSwitch.app"
          test -d "$APP_PATH"
          echo "Found app at: $APP_PATH"

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "dist/ClaudeMcpSwitch-${VERSION}.zip"
          echo "ZIP_PATH=app/dist/ClaudeMcpSwitch-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/ClaudeMcpSwitch.app"
          test -d "$APP_PATH"
          echo "Found app at: $APP_PATH"

          STAGING="build/dmg-stage"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"

          cp -R "$APP_PATH" "$STAGING/Claude MCP Switch.app"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Claude MCP Switch ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "dist/ClaudeMcpSwitch-${VERSION}.dmg"

          echo "DMG_PATH=app/dist/ClaudeMcpSwitch-${VERSION}.dmg" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ZIP_PATH }}
            ${{ env.DMG_PATH }}
          generate_release_notes: true

  update-cask:
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: read
    env:
      TAG: ${{ needs.build-release.outputs.tag }}
      VERSION: ${{ needs.build-release.outputs.version }}

    steps:
      - name: Download DMG from the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p dist

          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "ClaudeMcpSwitch-${VERSION}.dmg" \
            --dir dist

      - name: Compute SHA256
        run: |
          set -euo pipefail
          DMG="dist/ClaudeMcpSwitch-${VERSION}.dmg"
          SHA="$(sha256sum "$DMG" | awk '{print $1}')"
          echo "DMG_SHA256=$SHA" >> "$GITHUB_ENV"

      - name: Checkout Homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: inspectr-hq/homebrew-inspectr
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-inspectr

      - name: Update Claude MCP Switch cask
        run: |
          set -euo pipefail

          CASK_FILE="homebrew-inspectr/Casks/claude-mcp-switch.rb"
          RELEASE_URL="https://github.com/inspectr-hq/claude-mcp-switch/releases/download/${TAG}/ClaudeMcpSwitch-${VERSION}.dmg"

          if [ ! -f "$CASK_FILE" ]; then
            echo "Cask file not found at $CASK_FILE"
            exit 1
          fi

          sed -i -E "s|^  version \".*\"|  version \"${VERSION}\"|" "$CASK_FILE"
          sed -i -E "s|^  sha256 \".*\"|  sha256 \"${DMG_SHA256}\"|" "$CASK_FILE"
          sed -i -E "s|^  url \".*\"|  url \"${RELEASE_URL}\"|" "$CASK_FILE"

      - name: Commit and push cask update
        run: |
          set -euo pipefail
          cd homebrew-inspectr

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Casks/claude-mcp-switch.rb; then
            echo "No cask changes detected; skipping commit."
            exit 0
          fi

          git add Casks/claude-mcp-switch.rb
          git commit -m "claude-mcp-switch: update to ${VERSION}"
          git push origin HEAD:main
